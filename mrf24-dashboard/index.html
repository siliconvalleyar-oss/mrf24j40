<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZigBee MRF24J40 — IoT Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<style>
/* ==========================================================================
   ZigBee MRF24J40 Dashboard — Estilos completos
   ========================================================================== */
:root {
  --bg-primary: #0a0e17;
  --bg-secondary: #111827;
  --bg-card: #1a2332;
  --bg-hover: #243044;
  --border: #1e3a5f;
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent: #0ea5e9;
  --accent-glow: rgba(14,165,233,0.15);
  --green: #22c55e;
  --amber: #f59e0b;
  --red: #ef4444;
  --purple: #a855f7;
  --sidebar-width: 280px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
}

/* ==========================================================================
   Terminal Header Bar
   ========================================================================== */
.terminal-bar {
  display: flex; align-items: center; gap: 1rem;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 0.6rem 1.25rem;
  height: 48px;
  -webkit-app-region: drag;
}
.terminal-dots { display: flex; gap: 6px; }
.terminal-dot {
  width: 12px; height: 12px; border-radius: 50%;
  transition: opacity 0.2s;
}
.terminal-dot:hover { opacity: 0.7; }
.terminal-dot.red { background: var(--red); }
.terminal-dot.amber { background: var(--amber); }
.terminal-dot.green { background: var(--green); }
.terminal-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem; color: var(--text-secondary);
  -webkit-app-region: no-drag;
}
.terminal-title span { color: var(--accent); }
.terminal-badge {
  margin-left: auto;
  font-size: 0.65rem; padding: 2px 8px;
  border-radius: 10px; background: var(--accent);
  color: #000; font-weight: 600;
  letter-spacing: 0.5px;
  -webkit-app-region: no-drag;
}

/* ==========================================================================
   Layout
   ========================================================================== */
#app {
  display: flex;
  height: calc(100vh - 48px);
}

/* ==========================================================================
   Sidebar
   ========================================================================== */
#sidebar {
  width: var(--sidebar-width);
  min-width: var(--sidebar-width);
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  transition: width 0.3s ease, min-width 0.3s ease;
  overflow: hidden;
}
#sidebar.collapsed {
  width: 0;
  min-width: 0;
}

.sidebar-header {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.75rem 1rem;
  border-bottom: 1px solid var(--border);
}
.sidebar-header h2 {
  font-size: 0.75rem; font-weight: 600;
  color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 1px;
  flex: 1;
}
#toggleSidebar {
  background: none; border: none; color: var(--text-muted);
  cursor: pointer; font-size: 0.9rem; padding: 2px;
  transition: color 0.2s;
}
#toggleSidebar:hover { color: var(--text-primary); }

/* Search */
.search-box {
  padding: 0.75rem 1rem;
  border-bottom: 1px solid var(--border);
}
.search-box input {
  width: 100%;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.5rem 0.75rem;
  color: var(--text-primary);
  font-size: 0.8rem;
  font-family: 'Inter', sans-serif;
  outline: none;
  transition: border-color 0.2s;
}
.search-box input:focus { border-color: var(--accent); }
.search-box input::placeholder { color: var(--text-muted); }

/* File Tree */
#tree-container {
  flex: 1;
  overflow-y: auto;
  padding: 0.5rem 0;
}
#tree-container::-webkit-scrollbar { width: 4px; }
#tree-container::-webkit-scrollbar-track { background: transparent; }
#tree-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

#tree-root { list-style: none; font-size: 0.8rem; }
#tree-root ul { list-style: none; padding-left: 1rem; }
#tree-root li { margin: 0; }

#tree-root .file, #tree-root .folder {
  display: flex; align-items: center; gap: 0.4rem;
  padding: 0.3rem 1rem;
  cursor: pointer;
  color: var(--text-secondary);
  transition: all 0.15s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#tree-root .file:hover, #tree-root .folder:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}
#tree-root .file.active {
  background: var(--accent-glow);
  color: var(--accent);
  border-left: 2px solid var(--accent);
}
#tree-root .folder { font-weight: 500; color: var(--text-primary); }
#tree-root .folder::before { content: '📁'; }
#tree-root .folder.open::before { content: '📂'; }

/* Extension-based file colors */
#tree-root .file[data-ext="md"]::before { content: '📄'; }
#tree-root .file[data-ext="cpp"]::before,
#tree-root .file[data-ext="hpp"]::before,
#tree-root .file[data-ext="h"]::before { content: '📜'; }
#tree-root .file[data-ext="sh"]::before { content: '⚡'; }
#tree-root .file[data-ext="json"]::before { content: '📋'; }
#tree-root .file[data-ext="txt"]::before { content: '📝'; }
#tree-root .file[data-ext="Makefile"]::before,
#tree-root .file[data-ext="makefile"]::before { content: '🔧'; }
#tree-root .file[data-ext="dio"]::before { content: '📊'; }
#tree-root .file[data-ext="py"]::before { content: '🐍'; }
#tree-root .file[data-ext="yml"]::before,
#tree-root .file[data-ext="yaml"]::before { content: '⚙️'; }

.file-count {
  font-size: 0.65rem;
  color: var(--text-muted);
  padding: 0.5rem 1rem;
  border-top: 1px solid var(--border);
  text-align: center;
}

/* ==========================================================================
   Main Content
   ========================================================================== */
#main-content {
  flex: 1;
  overflow-y: auto;
  background: var(--bg-primary);
}
#main-content::-webkit-scrollbar { width: 6px; }
#main-content::-webkit-scrollbar-track { background: transparent; }
#main-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

#content-area {
  max-width: 960px;
  margin: 0 auto;
  padding: 2rem;
  min-height: 100%;
}

/* ==========================================================================
   Welcome / Dashboard
   ========================================================================== */
.dashboard { animation: fadeIn 0.5s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.dashboard-header {
  text-align: center;
  padding: 2rem 1rem 1.5rem;
}
.dashboard-logo {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.1rem;
  color: var(--accent);
  margin-bottom: 0.75rem;
  letter-spacing: 2px;
}
.dashboard-header h1 {
  font-size: 2rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 0.5rem;
}
.dashboard-header p {
  color: var(--text-secondary);
  font-size: 0.9rem;
}

/* Stats Grid */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 1rem;
  margin: 1.5rem 0;
}
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.25rem;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}
.stat-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(14,165,233,0.08);
}
.stat-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 3px;
}
.stat-card.accent::after { background: var(--accent); }
.stat-card.green::after { background: var(--green); }
.stat-card.amber::after { background: var(--amber); }
.stat-card.purple::after { background: var(--purple); }

.stat-label {
  font-size: 0.7rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 0.5rem;
}
.stat-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 0.25rem;
}
.stat-card.accent .stat-value { color: var(--accent); }
.stat-card.green .stat-value { color: var(--green); }
.stat-card.amber .stat-value { color: var(--amber); }
.stat-card.purple .stat-value { color: var(--purple); }
.stat-sub {
  font-size: 0.75rem;
  color: var(--text-muted);
}

/* Quick Actions */
.quick-actions {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 0.75rem;
  margin: 1.5rem 0;
}
.quick-btn {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.75rem 1rem;
  color: var(--text-secondary);
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.quick-btn:hover {
  background: var(--bg-hover);
  border-color: var(--accent);
  color: var(--text-primary);
  transform: translateY(-1px);
}
.quick-btn .icon { font-size: 1.2rem; display: block; margin-bottom: 0.3rem; }

/* Project info */
.project-info {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.25rem;
  margin: 1.5rem 0;
}
.project-info h3 {
  font-size: 0.8rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 1rem;
}
.info-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0.5rem 0;
  border-bottom: 1px solid rgba(30,58,95,0.3);
  font-size: 0.85rem;
}
.info-row:last-child { border-bottom: none; }
.info-label { color: var(--text-secondary); }
.info-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  color: var(--text-primary);
}
.info-value.tag {
  background: var(--accent-glow);
  color: var(--accent);
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.7rem;
}

/* ==========================================================================
   Code / Markdown Viewer
   ========================================================================== */
.file-viewer-header {
  display: flex; align-items: center; gap: 0.75rem;
  margin-bottom: 1rem;
  padding-bottom: 0.75rem;
  border-bottom: 1px solid var(--border);
}
.file-viewer-header .path {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  color: var(--text-secondary);
}
.file-viewer-header .path span { color: var(--accent); }
.file-viewer-header .lang-badge {
  margin-left: auto;
  font-size: 0.65rem;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--bg-hover);
  color: var(--text-muted);
}

.markdown-body {
  font-size: 0.9rem;
  line-height: 1.7;
  color: var(--text-primary);
  animation: fadeIn 0.3s ease;
}
.markdown-body h1 { font-size: 1.8rem; margin: 1.5em 0 0.5em; font-weight: 700; }
.markdown-body h2 { font-size: 1.4rem; margin: 1.5em 0 0.5em; font-weight: 600; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
.markdown-body h3 { font-size: 1.15rem; margin: 1.2em 0 0.4em; font-weight: 600; }
.markdown-body p { margin: 0.5em 0; }
.markdown-body a { color: var(--accent); text-decoration: none; }
.markdown-body a:hover { text-decoration: underline; }
.markdown-body pre {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1rem;
  overflow-x: auto;
  margin: 1em 0;
}
.markdown-body pre code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  background: none;
  padding: 0;
}
.markdown-body code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  background: var(--bg-hover);
  padding: 0.15em 0.4em;
  border-radius: 4px;
}
.markdown-body table { border-collapse: collapse; width: 100%; margin: 1em 0; }
.markdown-body th, .markdown-body td {
  border: 1px solid var(--border);
  padding: 0.5rem 0.75rem;
  text-align: left;
  font-size: 0.85rem;
}
.markdown-body th { background: var(--bg-card); font-weight: 600; }
.markdown-body ul, .markdown-body ol { padding-left: 1.5rem; margin: 0.5em 0; }
.markdown-body li { margin: 0.25em 0; }
.markdown-body blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 1rem;
  margin: 1em 0;
  color: var(--text-secondary);
}
.markdown-body hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }
.markdown-body img { max-width: 100%; border-radius: 8px; }

/* Code block (non-markdown files) */
.code-block-wrapper {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.code-block-header {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.5rem 1rem;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  font-size: 0.75rem;
  color: var(--text-muted);
}
.code-block-header .dot { width: 8px; height: 8px; border-radius: 50%; }
.code-block-header .dot.red { background: var(--red); }
.code-block-header .dot.amber { background: var(--amber); }
.code-block-header .dot.green { background: var(--green); }
.code-block-header .filename { margin-left: 0.5rem; color: var(--text-secondary); }
.code-block-body {
  padding: 1rem;
  overflow-x: auto;
}
.code-block-body pre {
  margin: 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  line-height: 1.5;
  color: var(--text-primary);
}

/* Loading state */
.loading {
  display: flex; align-items: center; justify-content: center;
  height: 200px; color: var(--text-muted); font-size: 0.9rem;
  gap: 0.5rem;
}
.spinner {
  width: 16px; height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-message {
  text-align: center; padding: 3rem 1rem;
  color: var(--red);
}
.error-message .icon { font-size: 2rem; margin-bottom: 0.5rem; }

/* ==========================================================================
   SVG Architecture Diagram
   ========================================================================== */
.arch-container {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.25rem;
  margin: 1.5rem 0;
}
.arch-container h3 {
  font-size: 0.8rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 1rem;
}
.arch-svg {
  width: 100%;
  height: auto;
  display: block;
}
.arch-box {
  transition: all 0.3s ease;
  cursor: pointer;
}
.arch-box:hover { filter: brightness(1.3); }
.arch-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  fill: var(--text-primary);
  text-anchor: middle;
  dominant-baseline: central;
  pointer-events: none;
}
.arch-sub {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  fill: var(--text-muted);
  text-anchor: middle;
  dominant-baseline: central;
  pointer-events: none;
}
.arch-line {
  stroke: var(--border);
  stroke-width: 1.5;
  fill: none;
}
.arch-arrow {
  fill: var(--text-muted);
}
@keyframes pulseNode {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}
.arch-pulse {
  animation: pulseNode 2s ease-in-out infinite;
}
@keyframes flowDot {
  0% { offset-distance: 0%; opacity: 1; }
  100% { offset-distance: 100%; opacity: 0.3; }
}
.flow-dot {
  animation: flowDot 2.5s linear infinite;
}
.flow-dot:nth-child(2) { animation-delay: 0.8s; }
.flow-dot:nth-child(3) { animation-delay: 1.6s; }

/* ==========================================================================
   Traffic Chart (Canvas)
   ========================================================================== */
.chart-container {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.25rem;
  margin: 1.5rem 0;
}
.chart-container h3 {
  font-size: 0.8rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 1rem;
}
.chart-wrapper {
  position: relative;
  width: 100%;
  height: 200px;
}
.chart-wrapper canvas {
  width: 100%;
  height: 100%;
  border-radius: 8px;
}
.chart-legend {
  display: flex;
  gap: 1.5rem;
  margin-top: 0.75rem;
  flex-wrap: wrap;
}
.chart-legend-item {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.75rem;
  color: var(--text-secondary);
}
.chart-legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}
.chart-stats {
  display: flex;
  gap: 1rem;
  margin-top: 0.5rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-muted);
}
.chart-stats span { color: var(--accent); }

/* ==========================================================================
   Animated Header
   ========================================================================== */
@keyframes signalPulse {
  0% { r: 15; opacity: 0.8; }
  100% { r: 40; opacity: 0; }
}
@keyframes signalPulse2 {
  0% { r: 20; opacity: 0.6; }
  100% { r: 55; opacity: 0; }
}
@keyframes signalPulse3 {
  0% { r: 25; opacity: 0.4; }
  100% { r: 70; opacity: 0; }
}
@keyframes rotateGlow {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
.dash-animated-logo {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 1rem;
}

/* Status bar */
.status-bar {
  display: flex;
  gap: 0.75rem;
  justify-content: center;
  margin: 1rem 0;
  flex-wrap: wrap;
}
.status-pill {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 0.3rem 0.75rem;
  font-size: 0.7rem;
  color: var(--text-secondary);
}
.status-led {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}
.status-led.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
.status-led.amber { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
.status-led.purple { background: var(--purple); box-shadow: 0 0 6px var(--purple); }
@keyframes blinkGreen {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.status-blink { animation: blinkGreen 1.5s ease-in-out infinite; }

/* ==========================================================================
   Responsive
   ========================================================================== */
@media (max-width: 768px) {
  #sidebar {
    position: fixed;
    z-index: 100;
    height: 100%;
    left: 0;
    top: 48px;
    transform: translateX(0);
    transition: transform 0.3s ease;
  }
  #sidebar.collapsed { transform: translateX(-100%); width: var(--sidebar-width); min-width: var(--sidebar-width); }
  #content-area { padding: 1rem; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
}

/* Highlight.js overrides */
.hljs { background: transparent !important; }
</style>
</head>
<body>

<!-- Terminal Bar -->
<div class="terminal-bar">
  <div class="terminal-dots">
    <span class="terminal-dot red"></span>
    <span class="terminal-dot amber"></span>
    <span class="terminal-dot green"></span>
  </div>
  <div class="terminal-title">guest@<span>mrf24</span>:~/zigbee-hub</div>
  <span class="terminal-badge">v2.0.2</span>
</div>

<div id="app">
  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <h2>Explorador</h2>
      <button id="toggleSidebar" title="Colapsar">◀</button>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Buscar archivos..." autocomplete="off">
    </div>
    <div id="tree-container">
      <ul id="tree-root"></ul>
    </div>
    <div class="file-count" id="fileCount"></div>
  </aside>

  <!-- Main -->
  <main id="main-content">
    <div id="content-area"></div>
  </main>
</div>

<script>
// ============================================================================
// ZigBee MRF24J40 Dashboard — Lógica completa
// ============================================================================

// ── File tree data (dinámico, extraído de la URL base) ──
const EXCLUDE_DIRS = /obj|bin|\.git|node_modules/;
const EXCLUDE_EXTS = /\.(o|d|a|so|dll|exe|class)$/;
// Prefijo para acceder a archivos raíz desde mrf24-dashboard/
const ROOT_PREFIX = window.location.pathname.includes('/mrf24-dashboard/') ? '..' : '.';

async function scanProject() {
  // Intentar cargar tree.json generado, o scanear con la API
  try {

// ── Tree Builder ──
function buildTree(files) {
  const root = {};
  for (const file of files) {
    const parts = file.path.split('/');
    let current = root;
    for (let i = 0; i < parts.length; i++) {
      if (i === parts.length - 1) {
        if (!current._files) current._files = [];
        current._files.push({ name: parts[i], path: file.path, ext: parts[i].includes('.') ? parts[i].split('.').pop().toLowerCase() : '' });
      } else {
        if (!current[parts[i]]) current[parts[i]] = {};
        current = current[parts[i]];
      }
    }
  }
  return root;
}

function sortTree(node) {
  const keys = Object.keys(node).filter(k => k !== '_files').sort((a,b) => a.toLowerCase().localeCompare(b.toLowerCase()));
  const result = {};
  for (const k of keys) { result[k] = sortTree(node[k]); }
  if (node._files) {
    result._files = [...node._files].sort((a,b) => a.name.toLowerCase().localeCompare(b.name.toLowerCase()));
  }
  return result;
}

function renderTree(node, path = '') {
  let html = '<ul>';
  const keys = Object.keys(node).filter(k => k !== '_files');
  for (const key of keys) {
    const subPath = path ? path + '/' + key : key;
    const hasChildren = node[key] && (Object.keys(node[key]).length > 1 || node[key]._files);
    html += `<li><span class="folder" data-path="${subPath}"> ${key}</span>`;
    html += renderTree(node[key], subPath);
    html += '</li>';
  }
  if (node._files) {
    for (const file of node._files) {
      const ext = file.ext;
      const displayExt = ext || (file.name === 'Makefile' ? 'makefile' : 'txt');
      html += `<li><span class="file" data-path="${file.path}" data-ext="${displayExt}"> ${file.name}</span></li>`;
    }
  }
  html += '</ul>';
  return html;
}

// ── Search ──
function filterTree(query) {
  const items = document.querySelectorAll('#tree-root .file, #tree-root .folder');
  const q = query.toLowerCase().trim();
  for (const item of items) {
    const text = item.textContent.toLowerCase();
    const path = item.dataset.path || '';
    const match = !q || text.includes(q) || path.includes(q);
    item.style.display = match ? '' : 'none';
  }
  // Show parent folders of matching items
  if (q) {
    document.querySelectorAll('#tree-root .folder').forEach(f => {
      const parent = f.closest('li');
      if (parent) {
        const hasVisible = parent.querySelector('.file[style*=\"display\"]') === null;
        f.style.display = '';
      }
    });
  }
}

async function loadFile(path) {
  const area = document.getElementById('content-area');
  area.innerHTML = '<div class="loading"><div class="spinner"></div><span>Cargando...</span></div>';
  try {
    const resp = await fetch(path);
    if (!resp.ok) throw new Error(`No se pudo cargar (${resp.status})`);
    let content = await resp.text();
    const ext = path.split('.').pop().toLowerCase();
    const isMd = ['md','markdown'].includes(ext);
    const isCode = ['cpp','hpp','h','c','cxx','cc','hh','java','js','ts','py','rb','go','rs','sh','bash','zsh','json','yml','yaml','xml','sql','css','scss','less'].includes(ext) || path.endsWith('Makefile');

    const activeEl = document.querySelector(`#tree-root .file[data-path="${path}"]`);

    const fileName = path.split('/').pop();
    const langMap = { cpp:'cpp', hpp:'cpp', h:'c', c:'c', js:'javascript', ts:'typescript', py:'python', rb:'ruby', go:'go', rs:'rust', sh:'bash', json:'json', yml:'yaml', yaml:'yaml', xml:'xml', css:'css', md:'markdown' };
    const lang = isCode ? (langMap[ext] || ext) : '';

    if (isMd) {
      area.innerHTML = `

          <span class="lang-badge">markdown</span>

// ── Real-time traffic chart ──
let chartAnimId = null;
let chartData = { packets: [], rssi: [], lqi: [], labels: [] };
const MAX_POINTS = 60;

let chartResizeObs = null;

function resizeChartCanvas(canvas) {
  const rect = canvas.parentElement.getBoundingClientRect();
  if (rect.width === 0) return;
  canvas.width = rect.width * 2;
  canvas.height = rect.height * 2;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
}

function initTrafficChart() {
  const canvas = document.getElementById('trafficCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  resizeChartCanvas(canvas);
  
  // ResizeObserver for responsive canvas
  if (chartResizeObs) chartResizeObs.disconnect();
  chartResizeObs = new ResizeObserver(() => resizeChartCanvas(canvas));
  chartResizeObs.observe(canvas.parentElement);

  // Seed data
  for (let i = 0; i < 20; i++) {
    chartData.packets.push(Math.random() * 40 + 10);
    chartData.rssi.push(Math.random() * 20 - 85);
    chartData.lqi.push(Math.random() * 40 + 160);
    chartData.labels.push('');
  }

  function drawChart() {
    const w = canvas.width;
    const h = canvas.height;
    ctx.clearRect(0, 0, w, h);

    // Background grid
    ctx.strokeStyle = 'rgba(30,58,95,0.3)';
    ctx.lineWidth = 1;
    for (let y = 0; y < 4; y++) {
      const yy = (y / 4) * h;
      ctx.beginPath(); ctx.moveTo(0, yy); ctx.lineTo(w, yy); ctx.stroke();
    }

    // Add new data point
    const t = Date.now() / 1000;
    chartData.packets.push(Math.sin(t * 0.5) * 15 + 25 + Math.random() * 8);
    chartData.rssi.push(Math.sin(t * 0.3 + 1) * 8 - 72 + Math.random() * 4);
    chartData.lqi.push(Math.sin(t * 0.4 + 2) * 15 + 200 + Math.random() * 10);
    chartData.labels.push('');
    if (chartData.packets.length > MAX_POINTS) {
      chartData.packets.shift();
      chartData.rssi.shift();
      chartData.lqi.shift();
      chartData.labels.shift();
    }

    const len = chartData.packets.length;
    const padL = 50, padR = 10, padT = 10, padB = 20;
    const plotW = w - padL - padR;
    const plotH = h - padT - padB;

    function toX(i) { return padL + (i / (MAX_POINTS - 1)) * plotW; }

    // Draw packets line
    const pMin = 0, pMax = 60;
    function toPY(v) { return padT + (1 - (v - pMin) / (pMax - pMin)) * plotH; }
    ctx.beginPath();
    ctx.strokeStyle = '#0ea5e9';
    ctx.lineWidth = 2.5;
    for (let i = 0; i < len; i++) {
      const x = toX(i + (MAX_POINTS - len));
      const y = toPY(chartData.packets[i]);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();

    // Fill under packets
    const lastX = toX((MAX_POINTS - 1));
    const firstX = toX((MAX_POINTS - len));
    ctx.lineTo(lastX, toPY(0));
    ctx.lineTo(firstX, toPY(0));
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, padT, 0, padT + plotH);
    grad.addColorStop(0, 'rgba(14,165,233,0.2)');
    grad.addColorStop(1, 'rgba(14,165,233,0.01)');
    ctx.fillStyle = grad;
    ctx.fill();

    // Draw RSSI line
    const rMin = -95, rMax = -55;
    function toRY(v) { return padT + (1 - (v - rMin) / (rMax - rMin)) * plotH; }
    ctx.beginPath();
    ctx.strokeStyle = '#22c55e';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    for (let i = 0; i < len; i++) {
      const x = toX(i + (MAX_POINTS - len));
      const y = toRY(chartData.rssi[i]);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // Draw LQI line
    const lMin = 100, lMax = 255;
    function toLY(v) { return padT + (1 - (v - lMin) / (lMax - lMin)) * plotH; }
    ctx.beginPath();
    ctx.strokeStyle = '#a855f7';
    ctx.lineWidth = 2;
    ctx.setLineDash([2, 3]);
    for (let i = 0; i < len; i++) {
      const x = toX(i + (MAX_POINTS - len));
      const y = toLY(chartData.lqi[i]);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // Y-axis labels (dynamic)
    ctx.fillStyle = '#64748b';
    ctx.font = '10px JetBrains Mono, monospace';
    ctx.textAlign = 'right';
    const yTicks = [0, 0.25, 0.5, 0.75, 1];
    for (const tick of yTicks) {
      const val = pMin + (pMax - pMin) * (1 - tick);
      const yy = padT + tick * plotH;
      ctx.fillText(val.toFixed(0), padL - 4, yy + 3);
      // Grid line
      ctx.strokeStyle = 'rgba(30,58,95,0.15)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(padL, yy); ctx.lineTo(padL + plotW, yy); ctx.stroke();
    }

    // Update stats (safe null check)
    const lastP = chartData.packets[chartData.packets.length - 1];
    const lastR = chartData.rssi[chartData.rssi.length - 1];
    const lastL = chartData.lqi[chartData.lqi.length - 1];
    const elPkt = document.getElementById('chart-pkt');
    const elRssi = document.getElementById('chart-rssi');
    const elLqi = document.getElementById('chart-lqi');
    if (elPkt) elPkt.textContent = lastP.toFixed(1);
    if (elRssi) elRssi.textContent = lastR.toFixed(1);
    if (elLqi) elLqi.textContent = lastL.toFixed(0);

    chartAnimId = requestAnimationFrame(drawChart);
  }

  drawChart();
}

// ── Init ──
async function init() {
  const files = await fetchFileList();
  const tree = sortTree(buildTree(files));
  document.getElementById('tree-root').innerHTML = renderTree(tree);
  document.getElementById('fileCount').textContent = `${files.length} archivos indexados`;

  // Click handlers
  document.addEventListener('click', function(e) {
    const target = e.target.closest('.file, .folder');
    if (!target) return;
    const path = target.dataset.path;
    if (target.classList.contains('file')) {
      loadFile(path);
    } else if (target.classList.contains('folder')) {
      target.classList.toggle('open');
      const ul = target.nextElementSibling;
      if (ul && ul.tagName === 'UL') {
        ul.style.display = ul.style.display === 'none' ? '' : 'none';
      }
    }
  });

  // Search
  document.getElementById('searchInput').addEventListener('input', function() {
    filterTree(this.value);
  });

  // Toggle sidebar
  document.getElementById('toggleSidebar').addEventListener('click', function() {
    document.getElementById('sidebar').classList.toggle('collapsed');
    this.textContent = document.getElementById('sidebar').classList.contains('collapsed') ? '▶' : '◀';
  });

  // Show dashboard
  showDashboard();
}

init();
</script>
